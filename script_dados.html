<script>
  let csvCache = "";
  let isAbaDadosInicializada = false;

  function formatarDataISO(dateObj) {
    let m = '' + (dateObj.getMonth() + 1);
    let d = '' + dateObj.getDate();
    let y = dateObj.getFullYear();
    if (m.length < 2) m = '0' + m;
    if (d.length < 2) d = '0' + d;
    return [y, m, d].join('-');
  }

  function inicializarAbaDados() {
    if(isAbaDadosInicializada) return;

    let hoje = new Date();
    let diaSemana = hoje.getDay() || 7; 
    let dtIni = new Date(hoje);
    dtIni.setDate(hoje.getDate() - diaSemana + 1 - 7);
    let dtFim = new Date(hoje); 

    document.getElementById('dd-inicio').value = formatarDataISO(dtIni);
    document.getElementById('dd-fim').value = formatarDataISO(dtFim);

    consultarBaseDetalhada();
    isAbaDadosInicializada = true;
  }

  function consultarBaseDetalhada() {
    const dtIni = document.getElementById('dd-inicio').value;
    const dtFim = document.getElementById('dd-fim').value;

    if(!dtIni || !dtFim) {
      alert("Por favor, selecione a Data de Início e a Data Fim.");
      return;
    }

    const d1 = new Date(dtIni + "T00:00:00");
    const d2 = new Date(dtFim + "T00:00:00");
    const diffTime = Math.abs(d2 - d1);
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

    if (diffDays > 31) {
      alert("O período selecionado excede 31 dias.\nPara não travar o seu painel e o servidor, exporte fatias menores de até 1 mês por vez.");
      return;
    }
    if (d1 > d2) {
      alert("A Data Inicial não pode ser maior que a Data Final.");
      return;
    }

    document.getElementById('dados-view').style.display = 'none';
    document.getElementById('loader-dados').style.display = 'flex';

    google.script.run
      .withSuccessHandler(renderizarTabelaDados)
      .withFailureHandler(function(err){
         document.getElementById('loader-dados').innerHTML = `<div class="alert alert-danger shadow-sm">❌ Erro na extração do banco de dados: ${err}</div>`;
      })
      .extraiBaseDetalhadaAltaPerformance(dtIni, dtFim);
  }

  function renderizarTabelaDados(response) {
    document.getElementById('loader-dados').style.display = 'none';
    document.getElementById('dados-view').style.display = 'block';

    if(!response || response.total === 0) {
      document.getElementById('tbody-dados').innerHTML = '<tr><td colspan="26" class="text-center py-5 text-muted">Nenhum dado encontrado para o período selecionado.</td></tr>';
      document.getElementById('lbl-total-linhas').innerText = '(0 linhas)';
      csvCache = "";
      return;
    }

    csvCache = response.csvContent;
    document.getElementById('lbl-total-linhas').innerText = `(${response.total.toLocaleString('pt-BR')} linhas prontas para exportação)`;

    let html = '';
    
    for(let i = 0; i < response.preview.length; i++) {
      let r = response.preview[i];
      
      // Tratamento de valores vazios/nulos visuais
      let r_id_pedido_pai = r.id_pedido_pai || '-';
      let r_id_pedido_filho = r.id_pedido_filho || '-';
      let r_tipo_venda = r.tipo_venda === 'null' || !r.tipo_venda ? '-' : r.tipo_venda;
      let r_grupo_venda = r.grupo_venda === 'null' || !r.grupo_venda ? '-' : r.grupo_venda;
      let r_bsatscore = r.bsatscore === 'null' || !r.bsatscore ? '-' : r.bsatscore;
      let r_confidence = r.confidence_score === 'null' || !r.confidence_score ? '-' : r.confidence_score;
      let r_recontato = r.recontato === 'null' || !r.recontato ? '-' : r.recontato;
      
      // O Hyperlink da conversa formatado
      let htmlLink = r.link_conversa ? `<a href="${r.link_conversa}" target="_blank" class="text-primary text-decoration-none fw-bold"><i class="bi bi-box-arrow-up-right"></i> Abrir</a>` : '-';

      html += `<tr>
        <td class="ps-2 text-nowrap text-start">${r.conversation_start_time_br}</td>
        <td class="text-start fw-bold">${r.conversation_id}</td>
        <td class="text-center">${r.retido}</td>
        <td class="text-center">${r_id_pedido_pai}</td>
        <td class="text-center">${r_id_pedido_filho}</td>
        <td class="text-center">${r_tipo_venda}</td>
        <td class="text-center">${r_grupo_venda}</td>
        <td class="text-center">${htmlLink}</td>
        <td class="text-start text-capitalize">${r.data_use_case}</td>
        <td class="text-center fw-bold">${r_bsatscore}</td>
        <td class="text-start">${r.horario_atendimento}</td>
        <td class="text-nowrap">${r.conversation_end_date_br}</td>
        <td class="text-center">${r.channel}</td>
        <td class="text-center">${r.conversation_status}</td>
        <td class="text-start">${r.last_resolution}</td>
        <td class="text-center">${r.is_llm_conversation}</td>
        <td class="text-center">${r.bot_messages_count}</td>
        <td class="text-center">${r.visitor_messages_count}</td>
        <td class="text-center">${r.not_understood_messages_count}</td>
        <td class="text-center">${r_confidence}</td>
        <td class="text-start">${r.platform_conversation_id}</td>
        <td class="text-nowrap">${r.conversation_start_date_br}</td>
        <td class="text-center">${r.conversation_start_week}</td>
        <td class="text-center">${r.conversation_start_month}</td>
        <td class="text-center">${r.conversation_start_hora}</td>
        <td class="text-center">${r_recontato}</td>
      </tr>`;
    }
    
    if(response.total > response.preview.length) {
      html += `<tr><td colspan="26" class="text-center py-3 text-muted fw-bold" style="background: var(--bg);">Tabela de pré-visualização limitada a ${response.preview.length} linhas. Clique em "Baixar CSV" para extrair todas as ${response.total.toLocaleString('pt-BR')} interações.</td></tr>`;
    }

    document.getElementById('tbody-dados').innerHTML = html;
  }

  function exportarCSV() {
    if(!csvCache || csvCache.trim() === "") {
      alert("Não há dados carregados para exportar. Por favor, realize uma busca primeiro.");
      return;
    }

    let fileName = `Base_Detalhada_UltimateBot_${document.getElementById('dd-inicio').value}_ate_${document.getElementById('dd-fim').value}.csv`;
    
    let blob = new Blob(["\uFEFF" + csvCache], { type: 'text/csv;charset=utf-8;' }); 
    
    let link = document.createElement("a");
    if (link.download !== undefined) { 
        let url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", fileName);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url); 
    } else {
        alert("O seu navegador bloqueou o download automático.");
    }
  }
</script>
